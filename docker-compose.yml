services:
  backend:
    build:
      context: ./backend/reading
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/app/data
    environment:
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/app.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ""
        REACT_APP_USER_POOL_ID: ${REACT_APP_USER_POOL_ID:-}
        REACT_APP_USER_POOL_CLIENT_ID: ${REACT_APP_USER_POOL_CLIENT_ID:-}
        REACT_APP_AWS_REGION: ${REACT_APP_AWS_REGION:-}
        REACT_APP_DEV_USER_ID: ${REACT_APP_DEV_USER_ID:-}
        REACT_APP_IDENTITY_POOL_ID: ${REACT_APP_IDENTITY_POOL_ID:-}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  backend-data:
